services:
  - type: web
    name: advanced-file-protection
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app --workers 1 --threads 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_SECRET_KEY
        generateValue: true
